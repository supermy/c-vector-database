name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [qwen35, minimax25, glm5, kimi25]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make

    - name: Build ${{ matrix.project }}
      run: |
        cd ${{ matrix.project }}
        make clean
        make
        # 静态编译
        gcc -static -std=c11 -O3 -Wall -Wextra -o test_${{ matrix.project == 'qwen35' && 'qwen35' || matrix.project == 'minimax25' && 'vdb' || matrix.project == 'glm5' && 'glm5' || 'vector_db' }} ${{ matrix.project }}/*.c -lm -lpthread 2>/dev/null || true

    - name: Package binary
      run: |
        mkdir -p release
        cd ${{ matrix.project }}
        cp test_* ../release/
        cd ../release
        tar -czf ${{ matrix.project }}-linux-x64.tar.gz test_*
        rm -f test_*

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-release
        path: release/*.tar.gz
        retention-days: 5

  create-release:
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Prepare release files
      run: |
        mkdir -p release
        cp artifacts/*/release/*.tar.gz release/ 2>/dev/null || true
        cd release
        # 创建校验和
        sha256sum *.tar.gz > SHA256SUMS.txt 2>/dev/null || true
        ls -la

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
